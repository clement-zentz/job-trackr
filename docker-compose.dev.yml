# docker-compose.dev.yml

services:

  job-trackr:
    container_name: job-trackr-dev
    build:
      context: ./backend
      dockerfile: docker/job-trackr/Dockerfile.dev
    ports:
      - "8001:8000"
      - "5680:5678"
    env_file:
      - backend/env/job-trackr/.env
    volumes:
      - ./backend/job_trackr/:/app/job_trackr
    depends_on:
      - postgres
    # command: tail -f /dev/null

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-dev
    ports:
      - "5173:5173"
    env_file:
      - frontend/.env.development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - job-trackr

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - backend/env/postgres/.env
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_dev_data:
